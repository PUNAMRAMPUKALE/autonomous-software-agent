[pytest]

python_files = test_*.py *_test.py

python_classes = Test*

python_functions = test_*

testpaths =
    tests

addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    llm: LLM related tests
    jira: Jira integration tests
    github: GitHub integration tests

filterwarnings =
    ignore::DeprecationWarning